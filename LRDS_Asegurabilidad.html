<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LRDS · Asegurabilidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EC;
    --surface: #FBF9F3;
    --ink: #1A1A18;
    --ink-soft: #4A4843;
    --ink-faint: #7A766B;
    --line: #DCD6C4;
    --line-soft: #ECE6D4;
    --accent: #6B7F47;
    --accent-soft: #EEF1E0;
    --accent-ink: #3F4B24;
    --ok: #3E7A4A;
    --ok-soft: #E5EFE4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter Tight", system-ui, -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.55;
    font-size: 16px;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; text-align: left; }
  input, select { font: inherit; color: inherit; font-family: inherit; }
  input:focus, select:focus { outline: none; }
  .serif { font-family: "Instrument Serif", Georgia, serif; letter-spacing: -0.01em; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; }
  svg { display: block; }

  .app { max-width: 460px; margin: 0 auto; color: var(--ink); }

  /* Header */
  .header { padding: 40px 24px 24px; border-bottom: 1px solid var(--line-soft); }
  .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, #869A5E 100%);
    box-shadow: 0 2px 4px rgba(63,75,36,.25);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-family: "Instrument Serif", serif; font-size: 24px; line-height: 1; }
  .brand-sub {
    font-size: 12px; letter-spacing: 0.14em; color: var(--ink-faint);
    margin-top: 4px; font-weight: 500;
  }
  .help-btn {
    width: 48px; height: 48px; border: 1px solid var(--line);
    border-radius: 999px; color: var(--ink-soft); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
  }

  /* Stepper */
  .stepper { display: flex; align-items: center; gap: 12px; }
  .step-item {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: none; padding: 0; cursor: pointer;
  }
  .step-dot {
    width: 32px; height: 32px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; transition: all .2s;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink-faint);
  }
  .step-dot.done   { background: var(--ink); border-color: var(--ink); color: var(--surface); }
  .step-dot.active { background: var(--accent); border-color: var(--accent); color: var(--surface); }
  .step-label { font-size: 14px; font-weight: 500; color: var(--ink-faint); }
  .step-item.done   .step-label { color: var(--ink-soft); }
  .step-item.active .step-label { color: var(--ink); font-weight: 600; }
  .step-line { flex: 1; height: 1.5px; background: var(--line); transition: background .3s; }
  .step-line.done { background: var(--ink); }

  /* Hero */
  .hero { padding: 32px 24px 8px; }
  .eyebrow {
    display: inline-block; font-size: 13px; font-weight: 600;
    letter-spacing: 0.08em; color: var(--accent-ink);
    background: var(--accent-soft);
    padding: 6px 12px; border-radius: 6px; margin-bottom: 16px;
  }
  .hero h1 { font-family: "Instrument Serif", serif; font-size: 38px; line-height: 1.1; margin-bottom: 12px; }
  .hero p { font-size: 17px; color: var(--ink-soft); line-height: 1.55; }

  /* Section */
  .section { padding: 32px 24px; border-top: 1px solid var(--line-soft); }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
  .section-title { display: flex; align-items: baseline; gap: 12px; }
  .section-num { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--ink-faint); font-weight: 500; }
  .section-head h2 { font-family: "Instrument Serif", serif; font-size: 26px; }
  .section-meta { font-size: 13px; color: var(--ink-faint); font-weight: 500; }

  /* Fields */
  .field { margin-bottom: 24px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field label {
    display: block; font-size: 14px; font-weight: 600;
    color: var(--ink); margin-bottom: 8px;
  }
  .field label.with-hint { margin-bottom: 2px; }
  .field .hint { font-size: 13px; color: var(--ink-faint); margin-bottom: 8px; line-height: 1.4; }
  .field input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 10px 0 12px; font-size: 18px; color: var(--ink);
  }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip {
    padding: 12px 18px; border-radius: 999px;
    font-size: 15px; font-weight: 500; min-height: 44px;
    border: 1px solid var(--line); background: var(--surface);
    color: var(--ink-soft); transition: all .15s;
  }
  .chip.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

  /* Km inline */
  .km-row { display: flex; align-items: baseline; gap: 8px; }
  .km-row input { flex: 1; }
  .km-unit { font-size: 16px; color: var(--ink-faint); font-weight: 500; }

  /* Process card (step 1 trust) */
  .process-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 8px 20px; margin-bottom: 20px;
  }
  .process-step {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid var(--line-soft);
  }
  .process-step:last-child { border-bottom: none; }
  .process-icon {
    width: 44px; height: 44px; min-width: 44px;
    border-radius: 12px; background: var(--accent-soft);
    color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .process-num {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 999px;
    background: var(--ink); color: var(--surface);
    font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--surface);
  }
  .process-body { flex: 1; min-width: 0; padding-top: 2px; }
  .process-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .process-sub { font-size: 14px; color: var(--ink-soft); line-height: 1.45; }
  .process-time {
    font-size: 12px; font-weight: 500;
    color: var(--accent-ink); background: var(--accent-soft);
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
    margin-top: 4px;
  }

  /* Trust & info boxes */
  .trust-box {
    display: flex; gap: 12px; padding: 16px;
    background: var(--accent-soft); border-radius: 14px;
    border: 1px solid var(--line);
  }
  .trust-icon { flex-shrink: 0; margin-top: 2px; }
  .trust-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .trust-text { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }

  .photo-intro {
    display: flex; gap: 12px; padding: 16px;
    background: var(--accent-soft); border-radius: 14px;
    border: 1px solid var(--line); margin-bottom: 24px;
  }

  /* Photos */
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .photo-slot {
    border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 220px; padding: 0; cursor: pointer;
    background: #F4F0E2; border: 1px dashed #C9C3B0;
  }
  .photo-slot.captured { background: var(--surface); border: 1px solid var(--line); }
  .photo-thumb {
    flex: 1; position: relative; min-height: 140px;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-slot.captured .photo-thumb {
    background: linear-gradient(135deg, #C8BDA4 0%, #8F8771 100%);
  }
  .photo-badge {
    position: absolute; top: 10px; right: 10px;
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .photo-slot.captured .photo-badge {
    background: var(--ok); border-color: var(--ok); color: #FFF;
  }
  .photo-caption {
    padding: 12px 14px; background: var(--surface);
    border-top: 1px solid var(--line-soft);
  }
  .photo-label { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .photo-hint { font-size: 12px; color: var(--ink-faint); line-height: 1.3; }
  .photo-hint.done {
    color: var(--ok); font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* Progress */
  .progress-row {
    margin-top: 24px; padding-top: 20px;
    display: flex; align-items: center; gap: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .progress-count { font-size: 16px; }
  .progress-count .big { font-family: "Instrument Serif", serif; font-size: 22px; margin-right: 6px; }
  .progress-count .soft { color: var(--ink-soft); }
  .progress-bar { flex: 1; height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
  .progress-pct { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--ink-soft); font-weight: 500; }

  /* Step 3 · summary */
  .summary-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
  }
  .summary-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--line-soft);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row-icon { color: var(--ink-faint); width: 22px; display: flex; justify-content: center; }
  .summary-row-body { flex: 1; min-width: 0; }
  .summary-row-label { font-size: 12px; color: var(--ink-faint); font-weight: 500; margin-bottom: 2px; }
  .summary-row-value { font-size: 15px; color: var(--ink); font-weight: 500; word-break: break-word; }
  .summary-row-value.empty { color: var(--ink-faint); font-style: italic; }

  .edit-btn {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 999px;
    color: var(--ink-soft); font-size: 13px; font-weight: 500;
    min-height: 36px;
  }

  .warning-box {
    display: flex; gap: 12px; padding: 14px;
    background: #FBF4E8; border-radius: 12px;
    border: 1px solid #E8D9B5; margin-bottom: 20px;
  }
  .warning-text { font-size: 14px; color: #5C4818; line-height: 1.5; }

  .photo-gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .gallery-cell {
    aspect-ratio: 1/1; border-radius: 12px; overflow: hidden;
    position: relative; display: flex; align-items: center; justify-content: center;
    background: #F4F0E2; border: 1px dashed var(--line);
  }
  .gallery-cell.done {
    background: linear-gradient(135deg, #C8BDA4 0%, #8F8771 100%);
    border-style: solid;
  }
  .gallery-num {
    position: absolute; bottom: 4px; left: 4px;
    background: var(--ink); color: var(--surface);
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500;
  }

  .accept-row {
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; padding: 4px;
  }
  .checkbox {
    width: 24px; height: 24px; min-width: 24px; border-radius: 6px;
    border: 2px solid var(--line); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all .15s;
  }
  .checkbox.checked { border-color: var(--ok); background: var(--ok); color: #FFF; }
  .accept-text { font-size: 15px; color: var(--ink-soft); line-height: 1.5; }
  .accept-text a { color: var(--accent-ink); text-decoration: underline; font-weight: 500; }

  /* Footer nav */
  .footer-nav {
    padding: 24px; background: var(--surface);
    border-top: 1px solid var(--line-soft);
    position: sticky; bottom: 0;
  }
  .footer-btns { display: flex; gap: 12px; }
  .btn-back {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 14px;
    padding: 16px 20px; font-size: 16px; font-weight: 600;
    min-height: 56px; flex: 0 0 auto;
  }
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: var(--ink); color: var(--surface);
    border-radius: 14px; padding: 18px 24px;
    font-size: 17px; font-weight: 600;
    min-height: 56px; flex: 1;
    transition: background .2s;
  }
  .btn-primary:hover { background: var(--accent); }
  .footer-note {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 16px; font-size: 13px; color: var(--ink-faint);
  }

  /* Success screen */
  .success {
    max-width: 460px; margin: 0 auto;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 80px 24px;
  }
  .success-icon {
    width: 96px; height: 96px; border-radius: 50%;
    background: var(--ok-soft); border: 2px solid var(--ok);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px; color: var(--ok);
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1);
  }
  .success h1 { font-family: "Instrument Serif", serif; font-size: 40px; line-height: 1.1; margin-bottom: 14px; }
  .success p { font-size: 17px; color: var(--ink-soft); margin-bottom: 32px; max-width: 360px; }
  .success p strong { color: var(--ink); font-weight: 600; }
  .ref-card {
    width: 100%; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 20px; margin-bottom: 32px;
    text-align: left;
  }
  .ref-label { font-size: 12px; letter-spacing: 0.12em; color: var(--ink-faint); margin-bottom: 6px; font-weight: 600; }
  .ref-num { font-family: "JetBrains Mono", monospace; font-size: 22px; color: var(--ink); font-weight: 500; }
  .ref-note { font-size: 13px; color: var(--ink-faint); margin-top: 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .step-enter { animation: fadeUp .35s ease-out; }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(.7); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
</head>

function icon(name, size, opts) {
  size = size || 22;
  opts = opts || {};
  const stroke = opts.stroke || "currentColor";
  const fill = opts.fill || "none";
  const sw = opts.sw || 1.75;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name]}</svg>`;
}

/* Car angle illustrations */
function carAngle(n, captured) {
  const color = captured ? "#FBF9F3" : "#5C5A54";
  const op = captured ? 0.9 : 0.5;
  const style = `width:72%;height:70%;opacity:${op};`;
  const attrs = `fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"`;
  if (n === 1) return `<svg style="${style}" viewBox="0 0 100 80" ${attrs}>
    <path d="M15 55 L20 35 L35 28 L65 28 L80 35 L85 55 L85 62 L15 62 Z"/>
    <circle cx="28" cy="62" r="6"/><circle cx="72" cy="62" r="6"/>
    <path d="M35 28 L40 40 L60 40 L65 28"/>
    <path d="M22 45 L28 45 M72 45 L78 45"/>
  </svg>`;
  if (n === 2) return `<svg style="${style}" viewBox="0 0 100 80" ${attrs}>
    <path d="M18 55 L22 32 L35 26 L65 26 L78 32 L82 55 L82 62 L18 62 Z"/>
    <circle cx="30" cy="62" r="6"/><circle cx="70" cy="62" r="6"/>
    <rect x="35" y="34" width="30" height="14" rx="2"/>
    <path d="M25 42 L32 42 M68 42 L75 42"/>
  </svg>`;
  if (n === 3) return `<svg style="${style}" viewBox="0 0 120 60" ${attrs}>
    <path d="M10 45 L18 30 L40 22 L80 22 L92 30 L110 32 L112 45 L10 45 Z"/>
    <circle cx="30" cy="45" r="7"/><circle cx="88" cy="45" r="7"/>
    <path d="M42 22 L48 32 L78 32 L82 22"/><path d="M60 22 L60 32"/>
  </svg>`;
  if (n === 4) return `<svg style="${style}" viewBox="0 0 120 60" ${attrs}>
    <g transform="scale(-1,1) translate(-120,0)">
      <path d="M10 45 L18 30 L40 22 L80 22 L92 30 L110 32 L112 45 L10 45 Z"/>
      <circle cx="30" cy="45" r="7"/><circle cx="88" cy="45" r="7"/>
      <path d="M42 22 L48 32 L78 32 L82 22"/><path d="M60 22 L60 32"/>
    </g>
  </svg>`;
  if (n === 5) return `<svg style="${style}" viewBox="0 0 120 70" ${attrs}>
    <path d="M20 55 L25 38 L45 30 L78 28 L92 34 L104 40 L108 55 Z"/>
    <circle cx="36" cy="55" r="6"/><circle cx="92" cy="55" r="6"/>
    <path d="M48 30 L54 42 L85 40 L88 30"/><path d="M102 42 L107 42"/>
  </svg>`;
  return `<svg style="${style}" viewBox="0 0 120 70" ${attrs}>
    <g transform="scale(-1,1) translate(-120,0)">
      <path d="M20 55 L25 38 L45 30 L78 28 L92 34 L104 40 L108 55 Z"/>
      <circle cx="36" cy="55" r="6"/><circle cx="92" cy="55" r="6"/>
      <rect x="48" y="32" width="38" height="12" rx="1"/>
    </g>
  </svg>`;
}

/* ==============================
   HELPERS
============================== */
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function stateOf(n, current) {
  if (n < current) return "done";
  if (n === current) return "active";
  return "pending";
}

function formatDate(iso) {
  if (!iso) return "";
  const parts = iso.split("-");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(parts[2])} ${meses[parseInt(parts[1]) - 1]} ${parts[0]}`;
}

/* ==============================
   RENDER
============================== */
function render() {
  const app = document.getElementById("app");
  if (state.submitted) {
    app.innerHTML = renderSuccess();
    return;
  }
  const h = HEROES[state.step];
  app.innerHTML = `
    <div class="app">
      ${renderHeader()}
      <section class="hero step-enter">
        <div class="eyebrow">${h.eyebrow}</div>
        <h1>${h.title}</h1>
        <p>${h.subtitle}</p>
      </section>
      <div class="step-enter">
        ${state.step === 1 ? renderStep1() : ""}
        ${state.step === 2 ? renderStep2() : ""}
        ${state.step === 3 ? renderStep3() : ""}
      </div>
      ${renderFooterNav()}
    </div>
  `;
}

function renderHeader() {
  const s1 = stateOf(1, state.step);
  const s2 = stateOf(2, state.step);
  const s3 = stateOf(3, state.step);
  return `
    <header class="header">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark">${icon("shield", 22, { stroke: "#FBF9F3", sw: 2 })}</div>
          <div>
            <div class="brand-name">LRDS</div>
            <div class="brand-sub">ASEGURABILIDAD</div>
          </div>
        </div>
        <button class="help-btn" aria-label="Ayuda">${icon("helpCircle", 22)}</button>
      </div>
      <div class="stepper">
        ${stepItem(1, "Cuenta",   s1)}
        <div class="step-line ${state.step > 1 ? "done" : ""}"></div>
        ${stepItem(2, "Vehículo", s2)}
        <div class="step-line ${state.step > 2 ? "done" : ""}"></div>
        ${stepItem(3, "Revisión", s3)}
      </div>
    </header>
  `;
}

function stepItem(n, label, st) {
  const contents = st === "done" ? icon("check", 16, { sw: 3 }) : n;
  return `
    <button class="step-item ${st}" onclick="goTo(${n})">
      <div class="step-dot ${st}">${contents}</div>
      <span class="step-label">${label}</span>
    </button>
  `;
}

/* ========== STEP 1 ========== */
function renderStep1() {
  const d = state.data;
  return `
    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="section-num">00</span>
          <h2 class="serif">Así funciona</h2>
        </div>
      </div>

      <div class="process-card">
        ${processStep(1, icon("fileText",22), "Completa tus datos", "Información personal y del vehículo.", "~2 min")}
        ${processStep(2, icon("camera",22),   "Toma 6 fotografías", "Usa la cámara de tu teléfono para capturar tu auto desde distintos ángulos.", "~3 min")}
        ${processStep(3, icon("messageCircle",22), "Recibe tu respuesta", "Un asesor humano te contactará con la evaluación y opciones de póliza.", "24 h")}
      </div>

      <div class="trust-box">
        <div class="trust-icon" style="color: var(--accent-ink);">${icon("lock", 22, { sw: 2 })}</div>
        <div>
          <div class="trust-title">Tu información está protegida</div>
          <div class="trust-text">Cumplimos con la normativa de protección de datos. Solo usamos tu información para evaluar esta solicitud y puedes pedir que la eliminemos en cualquier momento.</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="section-num">01</span>
          <h2 class="serif">Información personal</h2>
        </div>
        <span class="section-meta">6 de 7 completos</span>
      </div>

      ${field("Nombre completo", `<input oninput="updateField('nombre', this.value)" value="${esc(d.nombre)}">`, "Tal como aparece en tu identificación")}

      <div class="field">
        <label>Tipo de identificación</label>
        <div class="chips">
          ${ID_TYPES.map(opt => `<button class="chip ${d.idType === opt ? "active" : ""}" onclick="setIdType('${opt}')">${opt}</button>`).join("")}
        </div>
      </div>

      ${field("Número de identificación", `<input class="mono" oninput="updateField('idNumber', this.value)" value="${esc(d.idNumber)}">`)}
      ${field("Fecha de nacimiento", `<input type="date" oninput="updateField('fechaNacimiento', this.value)" value="${esc(d.fechaNacimiento)}">`)}
      ${field("Teléfono", `<input class="mono" oninput="updateField('telefono', this.value)" value="${esc(d.telefono)}">`, "Incluye el código de país")}
      ${field("Correo electrónico", `<input type="email" oninput="updateField('email', this.value)" value="${esc(d.email)}">`)}
      ${field("Dirección", `<input oninput="updateField('direccion', this.value)" value="${esc(d.direccion)}">`, "Provincia, cantón y distrito")}
    </section>
  `;
}

function processStep(n, iconSvg, title, subtitle, time) {
  return `
    <div class="process-step">
      <div class="process-icon">
        ${iconSvg}
        <div class="process-num">${n}</div>
      </div>
      <div class="process-body">
        <div class="process-title">${title}</div>
        <div class="process-sub">${subtitle}</div>
      </div>
      <div class="process-time">${time}</div>
    </div>
  `;
}

function field(label, control, hint) {
  return `
    <div class="field">
      <label class="${hint ? "with-hint" : ""}">${label}</label>
      ${hint ? `<div class="hint">${hint}</div>` : ""}
      ${control}
    </div>
  `;
}

/* ========== STEP 2 ========== */
function renderStep2() {
  const d = state.data;
  const done = state.photos.filter(p => p.status === "done").length;
  const pct = Math.round((done / state.photos.length) * 100);

  return `
    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="section-num">01</span>
          <h2 class="serif">Datos del vehículo</h2>
        </div>
        <span class="section-meta">4 de 9 completos</span>
      </div>

      ${field("Placa", `<input class="mono" oninput="updateField('placa', this.value)" value="${esc(d.placa)}">`, "Como aparece en la tarjeta de circulación")}

      <div class="field-row">
        ${field("Marca", `<input oninput="updateField('marca', this.value)" value="${esc(d.marca)}">`)}
        ${field("Modelo", `<input oninput="updateField('modelo', this.value)" value="${esc(d.modelo)}">`)}
      </div>

      <div class="field-row three">
        ${field("Año", `<input oninput="updateField('anio', this.value)" value="${esc(d.anio)}">`)}
        ${field("Motor", `<input oninput="updateField('motor', this.value)" value="${esc(d.motor)}" placeholder="1.8 L">`)}
        ${field("Color", `<input oninput="updateField('color', this.value)" value="${esc(d.color)}" placeholder="—">`)}
      </div>

      ${field("Número de chasis (VIN)", `<input class="mono" oninput="updateField('vin', this.value)" value="${esc(d.vin)}" placeholder="Ej. 1HGBH41JXMN109186">`, "17 caracteres. Ubicado en el parabrisas o marco de la puerta")}

      <div class="field">
        <label>¿Cómo usas tu auto?</label>
        <div class="chips">
          ${USAGE_OPTIONS.map(opt => `<button class="chip ${d.usage === opt ? "active" : ""}" onclick="setUsage('${opt}')">${opt}</button>`).join("")}
        </div>
      </div>

      <div class="field">
        <label>Kilometraje actual</label>
        <div class="km-row">
          <input class="mono" oninput="updateField('km', this.value)" value="${esc(d.km)}">
          <span class="km-unit">km</span>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div class="section-title">
          <span class="section-num">02</span>
          <h2 class="serif">Fotografías del vehículo</h2>
        </div>
        <span class="section-meta">${done} de 6 tomadas</span>
      </div>

      <div class="photo-intro">
        <div class="trust-icon" style="color: var(--accent);">${icon("info", 22, { sw: 2 })}</div>
        <div>
          <div class="trust-title">Antes de empezar</div>
          <div class="trust-text" style="font-size:15px;">Toma las fotos afuera, con buena luz y el auto limpio. Asegúrate de que se vea completo en cada foto.</div>
        </div>
      </div>

      <div class="photo-grid">
        ${state.photos.map(p => {
          const cap = p.status === "done";
          return `
            <button class="photo-slot ${cap ? "captured" : ""}" onclick="togglePhoto(${p.id})">
              <div class="photo-thumb">
                ${carAngle(p.id, cap)}
                <div class="photo-badge">${cap ? icon("check", 16, { sw: 3 }) : icon("camera", 16)}</div>
              </div>
              <div class="photo-caption">
                <div class="photo-label">${p.label}</div>
                <div class="${cap ? "photo-hint done" : "photo-hint"}">
                  ${cap ? icon("check", 11, { sw: 3 }) + " Tomada — Toca para repetir" : esc(p.hint)}
                </div>
              </div>
            </button>
          `;
        }).join("")}
      </div>

      <div class="progress-row">
        <div class="progress-count"><span class="big">${done}</span><span class="soft">de ${state.photos.length} tomadas</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}%</div>
      </div>
    </section>
  `;
}

/* ========== STEP 3 ========== */
function renderStep3() {
  const d = state.data;
  const done = state.photos.filter(p => p.status === "done").length;

  return `
    <section class="section">
      <div class="summary-head">
        <div class="section-title">
          <span class="section-num">01</span>
          <h2 class="serif">Información personal</h2>
        </div>
        <button class="edit-btn" onclick="goTo(1)">${icon("pencil", 14, { sw: 2 })} Editar</button>
      </div>
      <div class="summary-card">
        ${summaryRow(icon("user", 18), "Nombre", d.nombre)}
        ${summaryRow(icon("fileText", 18), d.idType, d.idNumber, true)}
        ${summaryRow(icon("calendar", 18), "Fecha nacim.", formatDate(d.fechaNacimiento))}
        ${summaryRow(icon("phone", 18), "Teléfono", d.telefono, true)}
        ${summaryRow(icon("mail", 18), "Correo", d.email)}
        ${summaryRow(icon("mapPin", 18), "Dirección", d.direccion)}
      </div>
    </section>

    <section class="section">
      <div class="summary-head">
        <div class="section-title">
          <span class="section-num">02</span>
          <h2 class="serif">Vehículo</h2>
        </div>
        <button class="edit-btn" onclick="goTo(2)">${icon("pencil", 14, { sw: 2 })} Editar</button>
      </div>
      <div class="summary-card">
        ${summaryRow(icon("car", 18), "Vehículo", `${d.marca} ${d.modelo} ${d.anio}`)}
        ${summaryRow(null, "Placa", d.placa, true)}
        ${summaryRow(null, "Kilometraje", `${d.km} km`, true)}
        ${summaryRow(null, "Uso", d.usage)}
      </div>
    </section>

    <section class="section">
      <div class="summary-head">
        <div class="section-title">
          <span class="section-num">03</span>
          <h2 class="serif">Fotografías</h2>
        </div>
        <button class="edit-btn" onclick="goTo(2)">${icon("pencil", 14, { sw: 2 })} Editar</button>
      </div>

      ${done < 6 ? `
        <div class="warning-box">
          <div class="trust-icon" style="color:#8A6B1F;">${icon("info", 20, { sw: 2 })}</div>
          <div class="warning-text"><strong>Faltan ${6 - done} fotografías.</strong> Para enviar tu solicitud necesitas completar las seis.</div>
        </div>
      ` : ""}

      <div class="photo-gallery">
        ${state.photos.map(p => {
          const cap = p.status === "done";
          return `<div class="gallery-cell ${cap ? "done" : ""}">${carAngle(p.id, cap)}<div class="gallery-num">${p.id}</div></div>`;
        }).join("")}
      </div>
    </section>

    <section class="section">
      <div class="accept-row" onclick="toggleAccept()">
        <div class="checkbox ${state.accept ? "checked" : ""}">${state.accept ? icon("check", 14, { sw: 3 }) : ""}</div>
        <div class="accept-text">
          Declaro que la información es correcta y acepto los <a>términos y condiciones</a> y la <a>política de privacidad</a> de LRDS.
        </div>
      </div>
    </section>
  `;
}

function summaryRow(iconHtml, label, value, mono) {
  const val = value || `<span class="summary-row-value empty">Sin datos</span>`;
  return `
    <div class="summary-row">
      <div class="summary-row-icon">${iconHtml || ""}</div>
      <div class="summary-row-body">
        <div class="summary-row-label">${label}</div>
        <div class="summary-row-value ${mono ? "mono" : ""}">${value ? esc(value) : val}</div>
      </div>
    </div>
  `;
}

/* ========== FOOTER NAV ========== */
function renderFooterNav() {
  const isLast = state.step === 3;
  return `
    <div class="footer-nav">
      <div class="footer-btns">
        ${state.step > 1 ? `<button class="btn-back" onclick="back()">${icon("arrowLeft", 18, { sw: 2 })} Atrás</button>` : ""}
        <button class="btn-primary" onclick="${isLast ? "submit()" : "next()"}">
          ${isLast ? "Enviar solicitud" : "Continuar"}
          ${isLast ? icon("check", 20, { sw: 2.5 }) : icon("arrowRight", 20, { sw: 2 })}
        </button>
      </div>
      <div class="footer-note">${icon("shield", 14, { sw: 2 })} Tus datos están protegidos · ISO 27001</div>
    </div>
  `;
}

/* ========== SUCCESS ========== */
function renderSuccess() {
  const ref = "LRDS-" + Math.floor(100000 + Math.random() * 900000);
  const firstName = (state.data.nombre || "").split(" ")[0];
  return `
    <div class="success">
      <div class="success-icon">${icon("checkCircle2", 48, { stroke: "var(--ok)", sw: 2 })}</div>
      <div class="eyebrow">SOLICITUD RECIBIDA</div>
      <h1>¡Gracias, ${esc(firstName)}!</h1>
      <p>Hemos recibido tu solicitud de aseguramiento. Un ejecutivo te contactará en las próximas <strong>24 horas hábiles</strong> al correo o teléfono registrado.</p>
      <div class="ref-card">
        <div class="ref-label">NÚMERO DE REFERENCIA</div>
        <div class="ref-num">${ref}</div>
        <div class="ref-note">Guárdalo para consultar el estado de tu solicitud.</div>
      </div>
      <button class="btn-primary" style="width:100%;" onclick="resetApp()">Hacer otra solicitud</button>
      <div class="footer-note">${icon("shield", 14, { sw: 2 })} Tus datos están protegidos · ISO 27001</div>
    </div>
  `;
}

/* ==============================
   EVENT HANDLERS
============================== */
window.goTo = function(n) {
  state.step = n;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
};
window.next = function() { if (state.step < 3) window.goTo(state.step + 1); };
window.back = function() { if (state.step > 1) window.goTo(state.step - 1); };

window.setIdType = function(opt) { state.data.idType = opt; render(); };
window.setUsage  = function(opt) { state.data.usage  = opt; render(); };

window.togglePhoto = function(id) {
  const p = state.photos.find(x => x.id === id);
  p.status = p.status === "done" ? "pending" : "done";
  render();
};

window.updateField = function(key, value) { state.data[key] = value; };

window.toggleAccept = function() { state.accept = !state.accept; render(); };

window.submit = function() {
  state.submitted = true;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.resetApp = function() {
  state.submitted = false;
  state.step = 1;
  state.accept = false;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
};

/* Initial render */
render();
</script>
</body>
</html>
