<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7F4EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LRDS">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="LRDS · Solicitud de asegurabilidad vehicular">
<title>LRDS · Asegurabilidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EC;
    --surface: #FBF9F3;
    --ink: #1A1A18;
    --ink-soft: #4A4843;
    --ink-faint: #7A766B;
    --line: #DCD6C4;
    --line-soft: #ECE6D4;
    --accent: #6B7F47;
    --accent-soft: #EEF1E0;
    --accent-ink: #3F4B24;
    --ok: #3E7A4A;
    --ok-soft: #E5EFE4;
    --sat: env(safe-area-inset-top);
    --sab: env(safe-area-inset-bottom);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
    scroll-behavior: smooth;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter Tight", system-ui, -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.55;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
  }
  button {
    font: inherit; color: inherit; background: none; border: none;
    cursor: pointer; text-align: left;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  input, select, textarea {
    font: inherit; color: inherit; font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    border-radius: 0;
  }
  input:focus, select:focus { outline: none; }
  input::placeholder { color: var(--ink-faint); opacity: 1; }
  .serif { font-family: "Instrument Serif", Georgia, serif; letter-spacing: -0.01em; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; }
  svg { display: block; flex-shrink: 0; }

  .app { max-width: 460px; margin: 0 auto; color: var(--ink); padding-bottom: calc(140px + var(--sab)); }

  /* ---------- Header ---------- */
  .header {
    padding: max(28px, calc(16px + var(--sat))) 20px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .brand-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, #869A5E 100%);
    box-shadow: 0 2px 4px rgba(63,75,36,.25);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-family: "Instrument Serif", serif; font-size: 22px; line-height: 1; }
  .brand-sub {
    font-size: 11px; letter-spacing: 0.14em; color: var(--ink-faint);
    margin-top: 4px; font-weight: 500;
  }
  .help-btn {
    width: 44px; height: 44px; border: 1px solid var(--line);
    border-radius: 999px; color: var(--ink-soft); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s, background .15s;
  }
  .help-btn:active { transform: scale(.94); background: var(--bg); }

  /* ---------- Stepper ---------- */
  .stepper { display: flex; align-items: center; gap: 8px; }
  .step-item {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: none; padding: 4px 2px; cursor: pointer;
    min-height: 44px;
    transition: opacity .12s;
  }
  .step-item:active { opacity: .6; }
  .step-dot {
    width: 30px; height: 30px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; transition: all .2s; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--line); color: var(--ink-faint);
  }
  .step-dot.done   { background: var(--ink); border-color: var(--ink); color: var(--surface); }
  .step-dot.active { background: var(--accent); border-color: var(--accent); color: #FFF; }
  .step-label { font-size: 13px; font-weight: 500; color: var(--ink-faint); white-space: nowrap; }
  .step-item.done   .step-label { color: var(--ink-soft); }
  .step-item.active .step-label { color: var(--ink); font-weight: 600; }
  .step-line { flex: 1; height: 1.5px; background: var(--line); transition: background .3s; min-width: 8px; }
  .step-line.done { background: var(--ink); }

  /* ---------- Hero ---------- */
  .hero { padding: 28px 20px 4px; }
  .eyebrow {
    display: inline-block; font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; color: var(--accent-ink);
    background: var(--accent-soft);
    padding: 6px 12px; border-radius: 6px; margin-bottom: 14px;
  }
  .hero h1 {
    font-family: "Instrument Serif", serif;
    font-size: clamp(28px, 8.5vw, 36px);
    line-height: 1.08; margin-bottom: 12px;
  }
  .hero p { font-size: 16px; color: var(--ink-soft); line-height: 1.5; }

  /* ---------- Section ---------- */
  .section { padding: 28px 20px; border-top: 1px solid var(--line-soft); }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
  .section-title { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .section-num { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--ink-faint); font-weight: 500; }
  .section-head h2 { font-family: "Instrument Serif", serif; font-size: 24px; }
  .section-meta { font-size: 12px; color: var(--ink-faint); font-weight: 500; white-space: nowrap; }

  /* ---------- Fields ---------- */
  .field { margin-bottom: 22px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field label {
    display: block; font-size: 14px; font-weight: 600;
    color: var(--ink); margin-bottom: 8px;
  }
  .field label.with-hint { margin-bottom: 2px; }
  .field .hint { font-size: 13px; color: var(--ink-faint); margin-bottom: 8px; line-height: 1.4; }
  .field input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 10px 0 12px; font-size: 17px; color: var(--ink);
    transition: border-color .15s;
  }
  .field input:focus { border-bottom-color: var(--accent); }

  /* ---------- Chips ---------- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip {
    padding: 11px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 500; min-height: 44px;
    border: 1px solid var(--line); background: var(--surface);
    color: var(--ink-soft); transition: transform .1s, background .15s, color .15s, border-color .15s;
    display: inline-flex; align-items: center;
  }
  .chip:active { transform: scale(.96); }
  .chip.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }

  .km-row { display: flex; align-items: baseline; gap: 8px; }
  .km-row input { flex: 1; }
  .km-unit { font-size: 16px; color: var(--ink-faint); font-weight: 500; }

  /* ---------- Process card ---------- */
  .process-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 4px 18px; margin-bottom: 16px;
  }
  .process-step {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid var(--line-soft);
  }
  .process-step:last-child { border-bottom: none; }
  .process-icon {
    width: 42px; height: 42px; min-width: 42px;
    border-radius: 12px; background: var(--accent-soft);
    color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .process-num {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 999px;
    background: var(--ink); color: var(--surface);
    font-family: "JetBrains Mono", monospace; font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--surface);
  }
  .process-body { flex: 1; min-width: 0; padding-top: 2px; }
  .process-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .process-sub { font-size: 13px; color: var(--ink-soft); line-height: 1.4; }
  .process-time {
    font-size: 11px; font-weight: 600;
    color: var(--accent-ink); background: var(--accent-soft);
    padding: 4px 9px; border-radius: 999px; white-space: nowrap;
    margin-top: 3px;
  }

  /* ---------- Trust & info ---------- */
  .trust-box, .photo-intro {
    display: flex; gap: 12px; padding: 14px;
    background: var(--accent-soft); border-radius: 14px;
    border: 1px solid var(--line);
  }
  .photo-intro { margin-bottom: 20px; }
  .trust-icon { flex-shrink: 0; margin-top: 2px; }
  .trust-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .trust-text { font-size: 13px; color: var(--ink-soft); line-height: 1.45; }

  /* ---------- Photos ---------- */
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .photo-slot {
    border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 190px; padding: 0; cursor: pointer;
    background: #F4F0E2; border: 1px dashed #C9C3B0;
    transition: transform .1s;
  }
  .photo-slot:active { transform: scale(.98); }
  .photo-slot.captured { background: var(--surface); border: 1px solid var(--line); }
  .photo-thumb {
    flex: 1; position: relative; min-height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-slot.captured .photo-thumb {
    background: linear-gradient(135deg, #C8BDA4 0%, #8F8771 100%);
  }
  .photo-badge {
    position: absolute; top: 8px; right: 8px;
    width: 30px; height: 30px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
  }
  .photo-slot.captured .photo-badge {
    background: var(--ok); border-color: var(--ok); color: #FFF;
  }
  .photo-caption {
    padding: 10px 12px; background: var(--surface);
    border-top: 1px solid var(--line-soft);
  }
  .photo-label { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .photo-hint { font-size: 11px; color: var(--ink-faint); line-height: 1.3; }
  .photo-hint.done {
    color: var(--ok); font-weight: 500;
    display: inline-flex; align-items: center; gap: 3px;
  }

  /* ---------- Progress ---------- */
  .progress-row {
    margin-top: 20px; padding-top: 18px;
    display: flex; align-items: center; gap: 12px;
    border-top: 1px solid var(--line-soft);
  }
  .progress-count { font-size: 15px; white-space: nowrap; }
  .progress-count .big { font-family: "Instrument Serif", serif; font-size: 20px; margin-right: 5px; }
  .progress-count .soft { color: var(--ink-soft); font-size: 14px; }
  .progress-bar { flex: 1; height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }
  .progress-pct { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--ink-soft); font-weight: 500; }

  /* ---------- Summary ---------- */
  .summary-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 10px; }
  .summary-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden;
  }
  .summary-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px; border-bottom: 1px solid var(--line-soft);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row-icon { color: var(--ink-faint); width: 20px; display: flex; justify-content: center; }
  .summary-row-body { flex: 1; min-width: 0; }
  .summary-row-label { font-size: 11px; color: var(--ink-faint); font-weight: 500; margin-bottom: 2px; }
  .summary-row-value { font-size: 15px; color: var(--ink); font-weight: 500; word-break: break-word; }
  .summary-row-value.empty { color: var(--ink-faint); font-style: italic; }

  .edit-btn {
    display: flex; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--line);
    padding: 7px 12px; border-radius: 999px;
    color: var(--ink-soft); font-size: 13px; font-weight: 500;
    min-height: 36px; transition: transform .1s;
  }
  .edit-btn:active { transform: scale(.94); }

  .warning-box {
    display: flex; gap: 10px; padding: 12px;
    background: #FBF4E8; border-radius: 12px;
    border: 1px solid #E8D9B5; margin-bottom: 16px;
  }
  .warning-text { font-size: 13px; color: #5C4818; line-height: 1.45; }

  .photo-gallery { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .gallery-cell {
    aspect-ratio: 1/1; border-radius: 10px; overflow: hidden;
    position: relative; display: flex; align-items: center; justify-content: center;
    background: #F4F0E2; border: 1px dashed var(--line);
  }
  .gallery-cell.done {
    background: linear-gradient(135deg, #C8BDA4 0%, #8F8771 100%);
    border-style: solid;
  }
  .gallery-num {
    position: absolute; bottom: 3px; left: 3px;
    background: var(--ink); color: var(--surface);
    font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500;
  }

  .accept-row {
    display: flex; align-items: flex-start; gap: 12px;
    cursor: pointer; padding: 4px;
    transition: opacity .12s;
  }
  .accept-row:active { opacity: .7; }
  .checkbox {
    width: 24px; height: 24px; min-width: 24px; border-radius: 6px;
    border: 2px solid var(--line); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all .15s;
  }
  .checkbox.checked { border-color: var(--ok); background: var(--ok); color: #FFF; }
  .accept-text { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }
  .accept-text a { color: var(--accent-ink); text-decoration: underline; font-weight: 500; }

  /* ---------- Footer nav ---------- */
  .footer-nav {
    position: fixed; left: 0; right: 0; bottom: 0;
    padding: 16px 20px calc(16px + var(--sab));
    background: rgba(251, 249, 243, 0.88);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-top: 1px solid var(--line-soft);
    z-index: 10;
  }
  .footer-inner { max-width: 460px; margin: 0 auto; }
  .footer-btns { display: flex; gap: 10px; }
  .btn-back {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: transparent; color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 13px;
    padding: 14px 16px; font-size: 15px; font-weight: 600;
    min-height: 52px; flex: 0 0 auto;
    transition: transform .1s, background .15s;
  }
  .btn-back:active { transform: scale(.97); background: var(--line-soft); }
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--ink); color: var(--surface);
    border-radius: 13px; padding: 16px 20px;
    font-size: 16px; font-weight: 600;
    min-height: 52px; flex: 1;
    transition: transform .1s, background .2s;
  }
  .btn-primary:active { transform: scale(.98); background: var(--accent); }
  @media (hover: hover) {
    .btn-primary:hover { background: var(--accent); }
  }
  .footer-note {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 10px; font-size: 12px; color: var(--ink-faint);
  }

  /* ---------- Success ---------- */
  .success {
    max-width: 460px; margin: 0 auto;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: max(60px, var(--sat)) 24px max(40px, var(--sab));
  }
  .success-icon {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--ok-soft); border: 2px solid var(--ok);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; color: var(--ok);
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1);
  }
  .success h1 {
    font-family: "Instrument Serif", serif;
    font-size: clamp(30px, 9vw, 38px);
    line-height: 1.08; margin-bottom: 12px;
  }
  .success p { font-size: 16px; color: var(--ink-soft); margin-bottom: 28px; max-width: 340px; line-height: 1.5; }
  .success p strong { color: var(--ink); font-weight: 600; }
  .ref-card {
    width: 100%; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 18px; margin-bottom: 24px;
    text-align: left;
  }
  .ref-label { font-size: 11px; letter-spacing: 0.12em; color: var(--ink-faint); margin-bottom: 4px; font-weight: 600; }
  .ref-num { font-family: "JetBrains Mono", monospace; font-size: 20px; color: var(--ink); font-weight: 500; }
  .ref-note { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }
  .success .btn-primary { width: 100%; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .step-enter { animation: fadeUp .28s ease-out; }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(.7); }
    60%  { opacity: 1; transform: scale(1.08); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Prevenir zoom en iOS al enfocar input (respaldo: font-size >= 16px) */
  @supports (-webkit-touch-callout: none) {
    input, select, textarea { font-size: 17px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============ STATE ============ */
const STORAGE_KEY = 'lrds_state_v1';

const state = {
  step: 1,
  submitted: false,
  accept: false,
  data: {
    nombre: "María Fernanda Rodríguez",
    idType: "Cédula",
    idNumber: "1-1456-0789",
    fechaNacimiento: "1978-03-14",
    telefono: "+506 8812 4455",
    email: "maria.rodriguez@correo.cr",
    direccion: "San José, Curridabat",
    placa: "BMW-472",
    marca: "Toyota",
    modelo: "Corolla Cross",
    anio: "2023",
    motor: "",
    color: "",
    vin: "",
    usage: "Particular",
    km: "42 180",
  },
  photos: [
    { id: 1, label: "Frente del auto",    hint: "Vista completa de frente", status: "done" },
    { id: 2, label: "Parte trasera",       hint: "Con placa visible",        status: "done" },
    { id: 3, label: "Lado derecho",        hint: "Todo el costado",          status: "pending" },
    { id: 4, label: "Lado izquierdo",      hint: "Todo el costado",          status: "pending" },
    { id: 5, label: "Esquina delantera",   hint: "Vista diagonal (¾)",       status: "pending" },
    { id: 6, label: "Esquina trasera",     hint: "Vista diagonal (¾)",       status: "pending" },
  ],
};

const USAGE_OPTIONS = ["Particular", "Comercial", "Transporte público", "Carga"];
const ID_TYPES = ["Cédula", "DIMEX", "Pasaporte"];

const HEROES = {
  1: { eyebrow: "PASO 1 DE 3", title: "Empecemos por tus datos",     subtitle: "Te guiaremos en un proceso corto y sencillo. Antes de comenzar, mira cómo funciona." },
  2: { eyebrow: "PASO 2 DE 3", title: "Cuéntanos sobre tu vehículo", subtitle: "Datos del auto y seis fotografías desde distintos ángulos." },
  3: { eyebrow: "PASO 3 DE 3", title: "Revisa tu información",       subtitle: "Verifica que todo esté correcto. Si algo necesita cambios, toca el lápiz." },
};

/* ============ PERSISTENCE ============ */
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      step: state.step, data: state.data,
      photos: state.photos, accept: state.accept,
    }));
  } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.data) Object.assign(state.data, p.data);
    if (p.photos && Array.isArray(p.photos) && p.photos.length === 6) state.photos = p.photos;
    if (typeof p.step === 'number' && p.step >= 1 && p.step <= 3) state.step = p.step;
    if (typeof p.accept === 'boolean') state.accept = p.accept;
  } catch(e) {}
}
function clearState() { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }

/* ============ ICONS ============ */
const ICON_PATHS = {
  shield:        `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
  check:         `<polyline points="20 6 9 17 4 12"/>`,
  arrowRight:    `<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
  arrowLeft:     `<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>`,
  info:          `<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>`,

function icon(name, size, opts) {
  size = size || 20;
  opts = opts || {};
  const stroke = opts.stroke || "currentColor";
  const fill = opts.fill || "none";
  const sw = opts.sw || 1.75;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${ICON_PATHS[name]}</svg>`;
}
function carAngle(n, captured) {
  const color = captured ? "#FBF9F3" : "#5C5A54";
  const op = captured ? 0.9 : 0.5;
  const style = `width:70%;height:68%;opacity:${op};`;
  const a = `fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"`;
  if (n === 1) return `<svg style="${style}" viewBox="0 0 100 80" ${a}><path d="M15 55 L20 35 L35 28 L65 28 L80 35 L85 55 L85 62 L15 62 Z"/><circle cx="28" cy="62" r="6"/><circle cx="72" cy="62" r="6"/><path d="M35 28 L40 40 L60 40 L65 28"/><path d="M22 45 L28 45 M72 45 L78 45"/></svg>`;
  if (n === 2) return `<svg style="${style}" viewBox="0 0 100 80" ${a}><path d="M18 55 L22 32 L35 26 L65 26 L78 32 L82 55 L82 62 L18 62 Z"/><circle cx="30" cy="62" r="6"/><circle cx="70" cy="62" r="6"/><rect x="35" y="34" width="30" height="14" rx="2"/><path d="M25 42 L32 42 M68 42 L75 42"/></svg>`;
  if (n === 3) return `<svg style="${style}" viewBox="0 0 120 60" ${a}><path d="M10 45 L18 30 L40 22 L80 22 L92 30 L110 32 L112 45 L10 45 Z"/><circle cx="30" cy="45" r="7"/><circle cx="88" cy="45" r="7"/><path d="M42 22 L48 32 L78 32 L82 22"/><path d="M60 22 L60 32"/></svg>`;
  if (n === 4) return `<svg style="${style}" viewBox="0 0 120 60" ${a}><g transform="scale(-1,1) translate(-120,0)"><path d="M10 45 L18 30 L40 22 L80 22 L92 30 L110 32 L112 45 L10 45 Z"/><circle cx="30" cy="45" r="7"/><circle cx="88" cy="45" r="7"/><path d="M42 22 L48 32 L78 32 L82 22"/><path d="M60 22 L60 32"/></g></svg>`;
  if (n === 5) return `<svg style="${style}" viewBox="0 0 120 70" ${a}><path d="M20 55 L25 38 L45 30 L78 28 L92 34 L104 40 L108 55 Z"/><circle cx="36" cy="55" r="6"/><circle cx="92" cy="55" r="6"/><path d="M48 30 L54 42 L85 40 L88 30"/><path d="M102 42 L107 42"/></svg>`;
  return `<svg style="${style}" viewBox="0 0 120 70" ${a}><g transform="scale(-1,1) translate(-120,0)"><path d="M20 55 L25 38 L45 30 L78 28 L92 34 L104 40 L108 55 Z"/><circle cx="36" cy="55" r="6"/><circle cx="92" cy="55" r="6"/><rect x="48" y="32" width="38" height="12" rx="1"/></g></svg>`;
}

/* ============ HELPERS ============ */
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function stateOf(n, current) { return n < current ? "done" : n === current ? "active" : "pending"; }
function formatDate(iso) {
  if (!iso) return "";
  const p = iso.split("-");
  const m = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(p[2])} ${m[parseInt(p[1])-1]} ${p[0]}`;
}

/* Haptic feedback (Android + nuevos iPhones) */
function haptic() { if (navigator.vibrate) navigator.vibrate(8); }

/* ============ RENDER ============ */
function render() {
  const app = document.getElementById("app");
  if (state.submitted) { app.innerHTML = renderSuccess(); return; }
  const h = HEROES[state.step];
  app.innerHTML = `
    <div class="app">
      ${renderHeader()}
      <section class="hero step-enter">
        <div class="eyebrow">${h.eyebrow}</div>
        <h1 class="serif">${h.title}</h1>
        <p>${h.subtitle}</p>
      </section>
      <div class="step-enter">
        ${state.step === 1 ? renderStep1() : ""}
        ${state.step === 2 ? renderStep2() : ""}
        ${state.step === 3 ? renderStep3() : ""}
      </div>
    </div>
    ${renderFooterNav()}
  `;
}

function renderHeader() {
  return `

function stepItem(n, label, st) {

}

function processStep(n, iconSvg, title, subtitle, time) {

/* ======= EVENT HANDLERS ======= */
window.goTo = function(n) {
  state.step = n; saveState(); render();
  window.scrollTo({ top: 0, behavior: "smooth" }); haptic();
};
window.next = function() { if (state.step < 3) window.goTo(state.step + 1); };
window.back = function() { if (state.step > 1) window.goTo(state.step - 1); };
window.setIdType = function(opt) { state.data.idType = opt; saveState(); render(); haptic(); };
window.setUsage  = function(opt) { state.data.usage  = opt; saveState(); render(); haptic(); };
window.togglePhoto = function(id) {
  const p = state.photos.find(x => x.id === id);
  p.status = p.status === "done" ? "pending" : "done";
  saveState(); render(); haptic();
};
window.updateField = function(key, value) { state.data[key] = value; saveState(); };
window.toggleAccept = function() { state.accept = !state.accept; saveState(); render(); haptic(); };
window.submit = function() { state.submitted = true; render(); window.scrollTo({ top: 0 }); haptic(); };
window.resetApp = function() {
  state.submitted = false; state.step = 1; state.accept = false;
  clearState(); render(); window.scrollTo({ top: 0 });
};

/* Scroll input enfocado por encima del teclado iOS */
document.addEventListener("focusin", e => {
  const t = e.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "SELECT" || t.tagName === "TEXTAREA")) {
    setTimeout(() => { try { t.scrollIntoView({ block: "center", behavior: "smooth" }); } catch(_){} }, 280);
  }
});
